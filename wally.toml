[package]
name = "yuzkkj/code-service"
version = "1.0.4"
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"
description = "A fork of Leif Stout CodeService."
repository = "https://github.com/Yuzkkj/code-service"
license = "MIT"
authors = ["Leif Stout"]
exclude = ["**"]
include = [
    "default.project.json",
    "src",
    "src/**",
    "wally.toml",
]

[dependencies]
DataService = "leifstout/dataservice@1.0.0"
Networker = "leifstout/networker@0.3.1"
ServicePlayerData = "leifstout/serviceplayerdata@0.1.2"